<!doctype html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <title>{{ item.title }} - Bookstation</title>
    <style>
        body {
            margin: 0;
            background: #262b2f;
            color: #e8ecef;
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            height: 58px;
            background: #1f2327;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .button {
            background: #3f4850;
            color: white;
            padding: 9px 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        .audio-page {
            padding: 35px;
        }

        .audio-card {
            background: #30363b;
            border-radius: 8px;
            padding: 30px;
            max-width: 850px;
            display: flex;
            gap: 28px;
        }

        .cover {
            width: 210px;
            height: 300px;
            flex-shrink: 0;
            background: linear-gradient(145deg, #3d4664, #202536);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.22);
        }

        .info {
            flex: 1;
            min-width: 0;
        }

        h1 {
            margin-top: 0;
            font-weight: normal;
        }

        .meta {
            color: #aeb7bd;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }

        .fileinfo {
            color: #8f9aa2;
            font-size: 13px;
            margin-top: 8px;
        }

        @media (max-width: 800px) {
            .audio-card {
                flex-direction: column;
            }

            .cover {
                width: 180px;
                height: 260px;
            }
        }
    </style>

</head>
<body>
<header class="topbar">
        <strong>Bookstation ljudspelare</strong>
        <a class="button" href="{{ url_for('library.index') }}">Tillbaka</a>
    </header>

    <main class="audio-page">
        <section class="audio-card">
            <div class="cover">🎧</div>

            <div class="info">
                <h1>{{ item.title }}</h1>

                <div class="meta">
                    {% if item.author %}
                        {{ item.author }}
                    {% else %}
                        Okänd författare/uppläsare
                    {% endif %}
                </div>

                <audio controls preload="metadata">
                    <source src="{{ url_for('library.file_item', item_id=item.id) }}">
                    Din webbläsare stödjer inte ljuduppspelning.
                </audio>

                <div class="fileinfo">
                    {{ item.extension|upper|replace(".", "") }} · {{ item.size_text() }}
                </div>

                <p style="margin-top: 28px;">
                    <a class="button" href="{{ url_for('library.file_item', item_id=item.id) }}" target="_blank">
                        Öppna ljudfil
                    </a>
                </p>
            </div>
        </section>
    </main>
</body>
</html>
